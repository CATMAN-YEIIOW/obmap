# Mosquitto MQTT Broker Configuration
listener 1883
protocol mqtt

# Enable WebSocket support on port 8083
listener 8083
protocol websockets

# Authentication
allow_anonymous false
password_file /mosquitto/config/pwfile

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Connection limits
max_connections -1
max_keepalive 65535
